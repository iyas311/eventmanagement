apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: users-db

spec:
  serviceName: users-db
  replicas: 1

  selector:
    matchLabels:
      app: users-db

  template:
    metadata:
      labels:
        app: users-db

    spec:
      containers:
        - name: mysql
          image: mysql:8.0

          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: users-config
                  key: DB_NAME

            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: users-secret
                  key: DB_PASSWORD

          volumeMounts:
            - name: users-db-storage
              mountPath: /var/lib/mysql

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

  volumeClaimTemplates:
    - metadata:
        name: users-db-storage
      spec:
        accessModes: ["ReadWriteOnce"]

        resources:
          requests:
            storage: 5Gi