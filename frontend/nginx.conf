server {
    listen 80;
    server_name localhost;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/users/ {
        set $upstream_users users-service;
        rewrite ^/api/users/(.*) /$1 break;
        proxy_pass http://$upstream_users:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/events/ {
        set $upstream_events events-service;
        rewrite ^/api/events/(.*) /$1 break;
        proxy_pass http://$upstream_events:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/bookings/ {
        set $upstream_bookings booking-service;
        rewrite ^/api/bookings/(.*) /$1 break;
        proxy_pass http://$upstream_bookings:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/payment/ {
        set $upstream_payment payment-service;
        rewrite ^/api/payment/(.*) /$1 break;
        proxy_pass http://$upstream_payment:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/tickets/ {
        set $upstream_tickets ticket-service;
        rewrite ^/api/tickets/(.*) /$1 break;
        proxy_pass http://$upstream_tickets:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ai/ {
        set $upstream_ai ai-service;
        rewrite ^/api/ai/(.*) /$1 break;
        proxy_pass http://$upstream_ai:8007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/admin/ {
        set $upstream_admin admin-service;
        rewrite ^/api/admin/(.*) /$1 break;
        proxy_pass http://$upstream_admin:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/notifications/ {
        set $upstream_notifications notification-service;
        rewrite ^/api/notifications/(.*) /$1 break;
        proxy_pass http://$upstream_notifications:8006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
